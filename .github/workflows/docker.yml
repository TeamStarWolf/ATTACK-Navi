name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'nginx.conf'
      - 'src/**'
      - 'package*.json'
      - 'angular.json'
      - 'tsconfig*.json'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'nginx.conf'
      - 'src/**'
      - 'package*.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    name: Build and smoke-test Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t attack-navi:ci .

      - name: Smoke-test - container starts and serves
        run: |
          docker run -d --name attack-navi-test -p 8080:80 attack-navi:ci
          # Wait up to 15s for nginx to become ready
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "nginx is up after ${i}s"
              break
            fi
            sleep 1
          done
          # Verify HTTP 200 on root
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "Expected 200, got $STATUS" && exit 1)

      - name: Dump container logs on failure
        if: failure()
        run: docker logs attack-navi-test || true

      - name: Stop test container
        if: always()
        run: docker rm -f attack-navi-test || true
