name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * *'   # Daily at 6:17 AM UTC (off-minute to avoid fleet stampede)
  workflow_dispatch:        # On-demand via Actions tab or gh workflow run

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx ng test --no-watch --browsers=ChromeHeadless
      - run: npx ng build --base-href /attack-nav/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/mitre-mitigation-navigator/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
